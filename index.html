<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Climate Crisis AI Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── TOP BAR ── */
    .topbar {
      background: #1a1a2e;
      color: white;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .topbar-icon { font-size: 20px; }
    .topbar h1 { font-size: 15px; font-weight: 600; }
    .topbar p  { font-size: 11px; opacity: 0.7; }
    .online-dot {
      margin-left: auto;
      background: #22c55e;
      color: white;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* ── CRISIS BUTTONS ── */
    .crisis-row {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      background: white;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
    }
    .crisis-btn {
      flex: 1;
      padding: 8px 6px;
      border-radius: 8px;
      border: 1.5px solid #ddd;
      background: white;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s;
      text-align: center;
    }
    .crisis-btn:hover { border-color: #aaa; }
    .crisis-btn.active-heat  { background: #FAEEDA; border-color: #BA7517; color: #633806; }
    .crisis-btn.active-flood { background: #E6F1FB; border-color: #185FA5; color: #0C447C; }
    .crisis-btn.active-air   { background: #EAF3DE; border-color: #3B6D11; color: #27500A; }

    /* ── AREA CHIPS ── */
    .area-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding: 8px 12px;
      background: #fafafa;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
    }
    .area-chip {
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid #ccc;
      background: white;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .area-chip.selected {
      background: #1a1a2e;
      color: white;
      border-color: #1a1a2e;
    }

    /* ── CHAT AREA ── */
    .chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .empty-state {
      text-align: center;
      color: #999;
      margin-top: 40px;
      font-size: 13px;
      line-height: 1.8;
    }
    .empty-state .big { font-size: 36px; margin-bottom: 8px; }

    /* ── MESSAGES ── */
    .msg { display: flex; gap: 8px; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600;
      flex-shrink: 0;
    }
    .avatar.bot  { background: #1a1a2e; color: white; }
    .avatar.user { background: #e0e0e0; color: #333; }

    .bubble {
      max-width: 82%;
      padding: 9px 13px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.6;
    }
    .bubble.bot {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 2px 12px 12px 12px;
    }
    .bubble.user {
      background: #1a1a2e;
      color: white;
      border-radius: 12px 2px 12px 12px;
    }

    /* ── PHASE CARD ── */
    .phase-card {
      margin-top: 8px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #e0e0e0;
    }
    .phase-row-item {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 8px 10px;
      border-bottom: 1px solid #f0f0f0;
    }
    .phase-row-item:last-child { border-bottom: none; }
    .phase-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 12px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .phase-text { font-size: 12px; color: #444; line-height: 1.5; }
    .phase-text strong { font-weight: 600; color: #111; }

    /* ── TYPING DOTS ── */
    .typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #aaa;
      animation: blink 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.3} 40%{opacity:1} }

    /* ── QUICK QUESTIONS ── */
    .quick-row {
      padding: 8px 12px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      border-top: 1px solid #e0e0e0;
      background: #fafafa;
      flex-shrink: 0;
    }
    .quick-btn {
      font-size: 11px;
      padding: 5px 10px;
      border-radius: 20px;
      border: 1px solid #ccc;
      background: white;
      cursor: pointer;
      color: #444;
      transition: all 0.15s;
      font-family: inherit;
    }
    .quick-btn:hover { background: #f0f0f0; }

    /* ── INPUT ROW ── */
    .input-row {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      background: white;
      border-top: 1px solid #e0e0e0;
      flex-shrink: 0;
    }
    .chat-input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      background: #fafafa;
    }
    .chat-input:focus { border-color: #1a1a2e; background: white; }
    .send-btn {
      padding: 8px 16px;
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
    }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .send-btn:hover:not(:disabled) { background: #2d2d4e; }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-icon">🌍</div>
    <div>
      <h1>Climate Crisis AI</h1>
      <p id="header-sub">Powered by ArcGIS (Esri India)</p>
    </div>
    <div class="online-dot">● Online</div>
  </div>

  <!-- CRISIS SELECTOR -->
  <div class="crisis-row">
    <button class="crisis-btn" id="btn-heat"  onclick="selectCrisis('heat')">🌡️ Extreme Heat</button>
    <button class="crisis-btn" id="btn-flood" onclick="selectCrisis('flood')">🌊 Urban Flooding</button>
    <button class="crisis-btn" id="btn-air"   onclick="selectCrisis('air')">🍃 Air Quality</button>
  </div>

  <!-- AREA CHIPS -->
  <div class="area-row" id="area-row">
    <span class="area-chip selected" onclick="selectArea(this,'Residential')">Residential</span>
    <span class="area-chip"          onclick="selectArea(this,'Industrial')">Industrial</span>
    <span class="area-chip"          onclick="selectArea(this,'CBD')">CBD</span>
    <span class="area-chip"          onclick="selectArea(this,'Coastal')">Coastal</span>
    <span class="area-chip"          onclick="selectArea(this,'Peri-urban')">Peri-urban</span>
  </div>

  <!-- CHAT MESSAGES -->
  <div class="chat-body" id="chat-body">
    <div class="empty-state" id="empty-state">
      <div class="big">🌐</div>
      <strong>Area-wise Climate AI Chatbot</strong><br>
      Choose a crisis type above,<br>then ask about your area to get phased solutions.
    </div>
  </div>

  <!-- QUICK QUESTIONS -->
  <div class="quick-row" id="quick-row" style="display:none"></div>

  <!-- INPUT ROW -->
  <div class="input-row">
    <input class="chat-input" id="chat-input"
      placeholder="Select a crisis type first…"
      disabled
      onkeydown="if(event.key==='Enter') sendMsg()" />
    <button class="send-btn" id="send-btn" onclick="sendMsg()" disabled>Send</button>
  </div>

/* ── STATE ── */
let activeCrisis = null;
let activeArea   = 'Residential';

/* ── AREA SELECT ── */
function selectArea(el, area) {
  document.querySelectorAll('.area-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  activeArea = area;
}

/* ── CRISIS SELECT ── */
function selectCrisis(type) {
  activeCrisis = type;
  const c = CRISES[type];

  ['heat','flood','air'].forEach(t => {
    const b = document.getElementById('btn-' + t);
    b.className = 'crisis-btn';
    if (t === type) b.classList.add(c.cls);
  });

  document.getElementById('header-sub').textContent =
    c.icon + ' ' + c.label + ' · ' + activeArea;

  const input = document.getElementById('chat-input');
  const sendBtn = document.getElementById('send-btn');
  input.disabled = false;
  sendBtn.disabled = false;
  input.placeholder = 'Ask about ' + c.label + ' in ' + activeArea + '…';

  clearChat();
  addBotBubble(
    c.intro + ' <strong>' + activeArea + '</strong> area. ' + c.context
  );
  showQuickBtns(c.qs);
}

/* ── CHAT HELPERS ── */
function clearChat() {
  const body = document.getElementById('chat-body');
  body.innerHTML = '';
}

function addBotBubble(html) {
  const body = document.getElementById('chat-body');
  const row = document.createElement('div');
  row.className = 'msg';
  row.innerHTML = `
    <div class="avatar bot">AI</div>
    <div class="bubble bot">${html}</div>`;
  body.appendChild(row);
  body.scrollTop = body.scrollHeight;
}

function addUserBubble(text) {
  const body = document.getElementById('chat-body');
  const row = document.createElement('div');
  row.className = 'msg user';
  row.innerHTML = `
    <div class="avatar user">U</div>
    <div class="bubble user">${text}</div>`;
  body.appendChild(row);
  body.scrollTop = body.scrollHeight;
}

function showTyping() {
  const body = document.getElementById('chat-body');
  const row = document.createElement('div');
  row.className = 'msg';
  row.id = 'typing-row';
  row.innerHTML = `
    <div class="avatar bot">AI</div>
    <div class="bubble bot">
      <div class="typing">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>`;
  body.appendChild(row);
  body.scrollTop = body.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-row');
  if (t) t.remove();
}

function showQuickBtns(qs) {
  const qr = document.getElementById('quick-row');
  qr.style.display = 'flex';
  qr.innerHTML = qs.map(q =>
    `<button class="quick-btn" onclick="quickSend('${q.replace(/'/g,"\\'")}')">${q}</button>`
  ).join('');
}

/* ── RESPONSE BUILDER ── */
function buildPhasedResponse(crisis, area) {
  const list = (SOLUTIONS[crisis][area] || SOLUTIONS[crisis]['Residential']);
  const c = CRISES[crisis];
  let html = `Phased action plan for <strong>${c.label}</strong> — <strong>${area}</strong> zone:
    <div class="phase-card">`;
  list.forEach(s => {
    html += `
      <div class="phase-row-item">
        <span class="phase-badge" style="background:${s.bc};color:${s.tc}">${s.phase}</span>
        <div class="phase-text"><strong>${s.action}</strong><br>${s.detail}</div>
      </div>`;
  });
  html += '</div>';
  return html;
}

function generateResponse(text) {
  if (!activeCrisis) return 'Please select a crisis type first.';
  const c  = CRISES[activeCrisis];
  const lo = text.toLowerCase();

  if (lo.includes('cost') || lo.includes('budget') || lo.includes('fund')) {
    return `Estimated costs for <strong>${c.label}</strong> — <strong>${activeArea}</strong>:<br><br>
      • <strong>Immediate:</strong> ₹5–15L per 10,000 residents<br>
      • <strong>Short-term:</strong> ₹50L–2 Cr depending on infrastructure scale<br>
      • <strong>Medium-term:</strong> ₹2–20 Cr — eligible for Smart City / AMRUT funding<br>
      • <strong>Long-term:</strong> ₹20–200 Cr+ — NMCG, GEF, ADB climate resilience grants available`;
  }
  if (lo.includes('who') || lo.includes('stakeholder') || lo.includes('agency')) {
    return `Key stakeholders for <strong>${c.label}</strong> — <strong>${activeArea}</strong>:<br><br>
      • <strong>Municipal Corporation</strong> — lead implementation agency<br>
      • <strong>State Disaster Management Authority</strong> — emergency coordination<br>
      • <strong>Pollution Control Board</strong> — monitoring and enforcement<br>
      • <strong>PWD / Urban Development Dept</strong> — infrastructure works<br>
      • <strong>Health Department</strong> — community health and shelter<br>
      • <strong>NGOs & RWAs</strong> — last-mile outreach`;
  }
  return buildPhasedResponse(activeCrisis, activeArea);
}

/* ── SEND ── */
function sendMsg() {
  const input = document.getElementById('chat-input');
  const text  = input.value.trim();
  if (!text || !activeCrisis) return;
  input.value = '';
  addUserBubble(text);
  showTyping();
  setTimeout(() => {
    removeTyping();
    addBotBubble(generateResponse(text));
    showQuickBtns(CRISES[activeCrisis].qs);
  }, 800 + Math.random() * 600);
}

function quickSend(q) {
  document.getElementById('chat-input').value = q;
  sendMsg();
}
</script>
